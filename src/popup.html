<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBC Workday - Schedule Tool</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">

      <section class="popup-empty is-hidden" id="popup-empty">
        <h2>No saved schedules yet</h2>
        <p>Open Workday, save a schedule there, and it will appear here the next time you click the extension icon.</p>
      </section>

      <section class="popup-brand" aria-label="Extension name">
        <p class="popup-eyebrow">Chrome Extension</p>
        <h1 class="popup-brand-title">UBC Workday - Schedule Tool</h1>
      </section>

      <section class="popup-content is-hidden" id="popup-content">
        <div class="popup-picker" id="popup-picker-wrap">
          <span class="popup-picker-label">Saved Schedules:</span>
          <details class="schedule-saved-dropdown popup-saved-dropdown" id="popup-saved-dropdown">
            <summary class="schedule-saved-summary popup-saved-summary" aria-label="Choose saved schedule">
              <span class="text" id="popup-saved-summary-text">Schedules</span>
              <span class="popup-dropdown-caret" aria-hidden="true">&#9662;</span>
            </summary>
            <div class="schedule-saved-menu popup-saved-menu" id="popup-saved-menu"></div>
          </details>
        </div>

        <div class="popup-meta-row">
          <div class="schedule-term-pill" id="popup-term-pill">Detected Term</div>
          <div class="popup-meta" id="popup-meta"></div>
        </div>

        <div class="schedule-grid" id="popup-schedule-grid"></div>
        <div class="popup-alert footer-alert is-hidden" id="popup-footer-alert" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
